 <script>
    // ==================== FIREBASE CONFIGURATION ====================
    const firebaseConfig = {
        apiKey: "AIzaSyB0KYOi839PIvl1u8vqIHr5qhPPzb9Ty6k",
        authDomain: "toolswebsitefree.firebaseapp.com",
        projectId: "toolswebsitefree",
        storageBucket: "toolswebsitefree.firebasestorage.app",
        messagingSenderId: "471281852384",
        appId: "1:471281852384:web:59b941c617caa2ac0a9585",
        measurementId: "G-HW8D6JTCVB"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ==================== HANDLE REDIRECT RESULT ====================
    // This catches the user returning from Google/Facebook login
    auth.getRedirectResult().then((result) => {
        if (result.user) {
            showToast('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }
    }).catch((error) => {
        if (error.code === 'auth/account-exists-with-different-credential') {
            showToast('An account already exists with the same email address.', 'error');
        } else if (error.code !== 'auth/popup-closed-by-user') {
            showToast(error.message, 'error');
        }
    });

    // ==================== AUTH STATE OBSERVER ====================
    auth.onAuthStateChanged((user) => {
        if (user) {
            localStorage.setItem('ng_current_user', JSON.stringify({ 
                name: user.displayName || user.email.split('@')[0], 
                email: user.email 
            }));
        } else {
            localStorage.removeItem('ng_current_user');
        }
    });

    // ==================== TAB SWITCHING ====================
    function switchTab(tab) {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const forgotForm = document.getElementById('forgot-form');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const heading = document.getElementById('auth-heading');
        const subheading = document.getElementById('auth-subheading');

        clearAllErrors();

        if (tab === 'login') {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            forgotForm.classList.add('hidden');
            tabLogin.className = 'flex-1 py-3.5 text-sm font-bold tab-active transition';
            tabRegister.className = 'flex-1 py-3.5 text-sm font-bold tab-inactive transition';
            heading.textContent = 'Welcome Back';
            subheading.textContent = 'Sign in to continue your preparation';
        } else {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            forgotForm.classList.add('hidden');
            tabLogin.className = 'flex-1 py-3.5 text-sm font-bold tab-inactive transition';
            tabRegister.className = 'flex-1 py-3.5 text-sm font-bold tab-active transition';
            heading.textContent = 'Create Account';
            subheading.textContent = 'Start your Loksewa preparation journey';
        }
    }

    // ==================== FORGOT PASSWORD ====================
    function showForgotPassword(e) {
        e.preventDefault();
        clearAllErrors();
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('register-form').classList.add('hidden');
        document.getElementById('forgot-form').classList.remove('hidden');
        document.getElementById('tab-login').style.display = 'none';
        document.getElementById('tab-register').style.display = 'none';
        document.getElementById('auth-heading').textContent = 'Forgot Password?';
        document.getElementById('auth-subheading').textContent = "No worries, we'll send you a reset link";
    }

    function backToLogin() {
        clearAllErrors();
        document.getElementById('forgot-form').classList.add('hidden');
        document.getElementById('login-form').classList.remove('hidden');
        document.getElementById('tab-login').style.display = '';
        document.getElementById('tab-register').style.display = '';
        document.getElementById('auth-heading').textContent = 'Welcome Back';
        document.getElementById('auth-subheading').textContent = 'Sign in to continue your preparation';
        document.getElementById('tab-login').className = 'flex-1 py-3.5 text-sm font-bold tab-active transition';
        document.getElementById('tab-register').className = 'flex-1 py-3.5 text-sm font-bold tab-inactive transition';
    }

    // ==================== PASSWORD VISIBILITY ====================
    function togglePasswordVisibility(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // ==================== PASSWORD STRENGTH ====================
    function checkPasswordStrength(password) {
        let score = 0;
        if (password.length >= 6) score++;
        if (password.length >= 10) score++;
        if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
        if (/[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) score++;

        const colors = ['#ef4444', '#f59e0b', '#2563eb', '#10b981'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong'];
        const textEl = document.getElementById('strength-text');

        for (let i = 1; i <= 4; i++) {
            const bar = document.getElementById('str-' + i);
            if (i <= score) {
                bar.style.backgroundColor = colors[score - 1];
            } else {
                bar.style.backgroundColor = '';
                bar.className = 'password-strength-bar h-1.5 flex-1 rounded-full bg-slate-200 dark:bg-slate-600';
            }
        }

        if (password.length === 0) {
            textEl.textContent = '';
        } else {
            textEl.textContent = labels[score - 1] || 'Too short';
            textEl.style.color = colors[score - 1] || '#94a3b8';
        }
    }

    // ==================== ERROR HANDLING ====================
    function showError(elementId, message) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.classList.remove('hidden');
    }

    function hideError(elementId) {
        const el = document.getElementById(elementId);
        el.textContent = '';
        el.classList.add('hidden');
    }

    function clearAllErrors() {
        const errors = document.querySelectorAll('[id$="-error"]');
        errors.forEach(el => {
            el.textContent = '';
            el.classList.add('hidden');
        });
    }

    function shakeForm(formId) {
        const form = document.getElementById(formId);
        form.classList.add('shake');
        setTimeout(() => form.classList.remove('shake'), 500);
    }

    // ==================== TOAST NOTIFICATIONS ====================
    function showToast(message, type) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');

        const bgMap = {
            success: 'bg-emerald-500',
            error: 'bg-red-500',
            info: 'bg-primary',
            warning: 'bg-amber-500'
        };
        const iconMap = {
            success: 'fa-check-circle',
            error: 'fa-times-circle',
            info: 'fa-info-circle',
            warning: 'fa-exclamation-triangle'
        };

        toast.className = `toast flex items-center gap-3 px-5 py-3.5 rounded-xl ${bgMap[type] || bgMap.info} text-white shadow-2xl min-w-[280px] max-w-sm`;
        toast.innerHTML = `<i class="fa ${iconMap[type] || iconMap.info} text-lg"></i><span class="text-sm font-semibold">${message}</span>`;

        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('toast-exit');
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    // ==================== LOADING STATE ====================
    function setLoading(btnId, isLoading) {
        const btn = document.getElementById(btnId);
        if (isLoading) {
            btn.disabled = true;
            btn.dataset.originalText = btn.textContent;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> Please wait...';
            btn.style.opacity = '0.7';
            btn.style.cursor = 'not-allowed';
        } else {
            btn.disabled = false;
            btn.textContent = btn.dataset.originalText || btn.textContent;
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
        }
    }

    // ==================== VALIDATION ====================
    function validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // ==================== FIREBASE LOGIN HANDLER ====================
    function handleLogin(e) {
        e.preventDefault();
        clearAllErrors();

        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const rememberMe = document.getElementById('remember-me').checked;
        let hasError = false;

        if (!email) {
            showError('login-email-error', 'Email address is required');
            hasError = true;
        } else if (!validateEmail(email)) {
            showError('login-email-error', 'Please enter a valid email address');
            hasError = true;
        }

        if (!password) {
            showError('login-password-error', 'Password is required');
            hasError = true;
        }

        if (hasError) {
            shakeForm('login-form');
            return;
        }

        setLoading('login-btn', true);

        const persistence = rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;

        auth.setPersistence(persistence).then(() => {
            return auth.signInWithEmailAndPassword(email, password);
        }).then((userCredential) => {
            setLoading('login-btn', false);
            showToast('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }).catch((error) => {
            setLoading('login-btn', false);
            if (error.code === 'auth/user-not-found') {
                showError('login-email-error', 'No account found with this email address.');
            } else if (error.code === 'auth/wrong-password') {
                showError('login-password-error', 'Incorrect password. Please try again.');
            } else if (error.code === 'auth/invalid-email') {
                showError('login-email-error', 'Invalid email address format.');
            } else if (error.code === 'auth/too-many-requests') {
                showToast('Too many failed attempts. Please try again later.', 'error');
            } else {
                showError('login-email-error', error.message);
            }
            shakeForm('login-form');
        });
    }

    // ==================== FIREBASE REGISTER HANDLER ====================
    function handleRegister(e) {
        e.preventDefault();
        clearAllErrors();

        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;
        const agreeTerms = document.getElementById('agree-terms').checked;
        let hasError = false;

        if (!name) {
            showError('reg-name-error', 'Full name is required');
            hasError = true;
        } else if (name.length < 2) {
            showError('reg-name-error', 'Name must be at least 2 characters');
            hasError = true;
        }

        if (!email) {
            showError('reg-email-error', 'Email address is required');
            hasError = true;
        } else if (!validateEmail(email)) {
            showError('reg-email-error', 'Please enter a valid email address');
            hasError = true;
        }

        if (!password) {
            showError('reg-password-error', 'Password is required');
            hasError = true;
        } else if (password.length < 6) {
            showError('reg-password-error', 'Password must be at least 6 characters');
            hasError = true;
        }

        if (!confirm) {
            showError('reg-confirm-error', 'Please confirm your password');
            hasError = true;
        } else if (password !== confirm) {
            showError('reg-confirm-error', 'Passwords do not match');
            hasError = true;
        }

        if (!agreeTerms) {
            showToast('Please agree to the Privacy Policy and Terms of Service', 'warning');
            hasError = true;
        }

        if (hasError) {
            shakeForm('register-form');
            return;
        }

        setLoading('register-btn', true);

        auth.createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
                return userCredential.user.updateProfile({
                    displayName: name
                }).then(() => userCredential);
            }).then((userCredential) => {
                setLoading('register-btn', false);
                showToast('Account created successfully! Please sign in.', 'success');
                
                auth.signOut().then(() => {
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('login-email').value = email;
                        document.getElementById('login-password').focus();
                    }, 800);
                });
            }).catch((error) => {
                setLoading('register-btn', false);
                if (error.code === 'auth/email-already-in-use') {
                    showError('reg-email-error', 'An account with this email already exists.');
                } else if (error.code === 'auth/weak-password') {
                    showError('reg-password-error', 'Password is too weak. Use at least 6 characters.');
                } else {
                    showError('reg-email-error', error.message);
                }
                shakeForm('register-form');
            });
    }

    // ==================== FIREBASE FORGOT PASSWORD HANDLER ====================
    function handleForgotPassword(e) {
        e.preventDefault();
        clearAllErrors();

        const email = document.getElementById('forgot-email').value.trim();

        if (!email) {
            showError('forgot-email-error', 'Email address is required');
            shakeForm('forgot-form');
            return;
        }
        if (!validateEmail(email)) {
            showError('forgot-email-error', 'Please enter a valid email address');
            shakeForm('forgot-form');
            return;
        }

        const btn = document.querySelector('#forgot-form button[type="submit"]');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> Sending...';
        btn.style.opacity = '0.7';

        auth.sendPasswordResetEmail(email)
            .then(() => {
                showToast('Password reset link sent to your email!', 'success');
                setTimeout(() => backToLogin(), 2000);
            }).catch((error) => {
                if (error.code === 'auth/user-not-found') {
                    showError('forgot-email-error', 'No account found with this email address.');
                } else {
                    showError('forgot-email-error', error.message);
                }
                shakeForm('forgot-form');
            }).finally(() => {
                btn.disabled = false;
                btn.textContent = originalText;
                btn.style.opacity = '1';
            });
    }

    // ==================== FIREBASE SOCIAL LOGIN (FIXED: Using Redirect) ====================
    function socialLogin(provider) {
        let authProvider;
        if (provider === 'google') {
            authProvider = new firebase.auth.GoogleAuthProvider();
        } else if (provider === 'facebook') {
            authProvider = new firebase.auth.FacebookAuthProvider();
        }

        if (authProvider) {
            // Using REDIRECT instead of POPUP to prevent browser blocking
            auth.signInWithRedirect(authProvider).catch((error) => {
                showToast(error.message, 'error');
            });
        }
    }

    // ==================== DARK MODE ====================
    function toggleDarkMode() {
        const html = document.documentElement;
        const icon = document.getElementById('dark-icon');
        const iconMobile = document.getElementById('dark-icon-mobile');
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            if (icon) icon.classList.replace('fa-sun', 'fa-moon');
            if (iconMobile) iconMobile.classList.replace('fa-sun', 'fa-moon');
        } else {
            html.classList.add('dark');
            if (icon) icon.classList.replace('fa-moon', 'fa-sun');
            if (iconMobile) iconMobile.classList.replace('fa-moon', 'fa-sun');
        }
        localStorage.setItem('ng_dark', document.documentElement.classList.contains('dark'));
    }

    // ==================== MOBILE MENU ====================
    function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        if (menu.classList.contains('hidden')) {
            menu.classList.remove('hidden');
        } else {
            menu.classList.add('hidden');
        }
    }

    // ==================== INIT ====================
    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('ng_dark') === 'true' || 
            (!localStorage.getItem('ng_dark') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            const icon = document.getElementById('dark-icon');
            const iconMobile = document.getElementById('dark-icon-mobile');
            if (icon) icon.classList.replace('fa-moon', 'fa-sun');
            if (iconMobile) iconMobile.classList.replace('fa-moon', 'fa-sun');
        }
    });
</script>
